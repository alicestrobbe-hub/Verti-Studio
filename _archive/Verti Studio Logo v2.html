<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Verti Studio — Logo Refinement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --abisso: #0a0a0a; --notte: #141414; --granito: #1e1e1e;
    --pietra: #3a3a3a; --neve: #e8e4dc; --ghiaccio: #c8c4bc;
    --ambra: #c8b89a; --alpino: #3d5a3d;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: var(--sans); color: var(--neve); }
  .lo { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px; padding: 56px; background: var(--abisso); position: relative; }
  .lo.light { background: var(--neve); }
  .lo-meta { position:absolute; top:24px; left:24px; font-size:9px; font-weight:300; letter-spacing:.22em; text-transform:uppercase; color:var(--pietra); }
  .lo.light .lo-meta { color:#9a9489; }
  .lo-title { position:absolute; top:24px; right:24px; font-family:var(--serif); font-style:italic; font-weight:300; font-size:14px; color:var(--ghiaccio); letter-spacing:.01em; }
  .lo.light .lo-title { color:#3a3a3a; }
  .lo-tag { position:absolute; bottom:24px; left:24px; right:24px; font-size:10px; font-weight:300; letter-spacing:.16em; text-transform:uppercase; color:var(--pietra); text-align:center; }
  .lo.light .lo-tag { color:#7a7468; }

  .wm { font-family: var(--serif); font-weight: 300; color: var(--neve); letter-spacing:-.012em; line-height:1; }
  .lo.light .wm { color: var(--abisso); }
  .studio-cap { font-family: var(--sans); font-weight: 300; letter-spacing:.32em; text-transform:uppercase; color: var(--ghiaccio); }
  .lo.light .studio-cap { color: #555; }
  .coord { font-family: var(--sans); font-weight: 300; letter-spacing:.28em; text-transform:uppercase; color: var(--ghiaccio); font-variant-numeric: tabular-nums; }
  .lo.light .coord { color: #555; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const A = "#c8b89a", N = "#e8e4dc", AL = "#3d5a3d";

// ════════════════════════════════════════════════════════════════════
// FAMIGLIA A — Asta verticale (evoluzione 03) con coordinate
// ════════════════════════════════════════════════════════════════════

function A1_AstaCoord({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">A1 · Asta + coordinate sotto</div>
      <div className="lo-title">Verticalità · base</div>
      <div style={{ display:'flex', alignItems:'center', gap: 28 }}>
        <div style={{ width: 1, height: 110, background: A }}></div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          <div className="wm" style={{ fontSize: 60, lineHeight:.92 }}>Verti</div>
          <div className="studio-cap" style={{ fontSize:10 }}>Studio</div>
          <div className="coord" style={{ fontSize:9, marginTop:6, color: light?'#9a9489':'#7a7468' }}>46.4983° N · 11.3548° E</div>
        </div>
      </div>
      <div className="lo-tag">L'asta verticale. Coordinate come ancoraggio geografico, peso leggero.</div>
    </div>
  );
}

function A2_AstaCoordSplit({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">A2 · Asta · coordinate ai lati</div>
      <div className="lo-title">Verticalità · split</div>
      <div style={{ display:'flex', alignItems:'center', gap: 24 }}>
        <div className="coord" style={{ fontSize:9, writingMode:'vertical-rl', transform:'rotate(180deg)', color: light?'#9a9489':'#7a7468' }}>46.4983° N</div>
        <div style={{ width: 1, height: 110, background: A }}></div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          <div className="wm" style={{ fontSize: 60, lineHeight:.92 }}>Verti</div>
          <div className="studio-cap" style={{ fontSize:10 }}>Studio</div>
        </div>
        <div className="coord" style={{ fontSize:9, writingMode:'vertical-rl', color: light?'#9a9489':'#7a7468' }}>11.3548° E</div>
      </div>
      <div className="lo-tag">Coordinate verticali ai lati come pilastri. Composizione architettonica.</div>
    </div>
  );
}

function A3_AstaCoordTop({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">A3 · Asta · coordinata in vetta</div>
      <div className="lo-title">Verticalità · vetta</div>
      <div style={{ display:'flex', alignItems:'center', gap: 28 }}>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
          <div className="coord" style={{ fontSize:8, color: A }}>46.4983° N</div>
          <div style={{ width: 1, height: 96, background: A }}></div>
          <div className="coord" style={{ fontSize:8, color: light?'#9a9489':'#7a7468' }}>11.3548° E</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          <div className="wm" style={{ fontSize: 56, lineHeight:.92 }}>Verti</div>
          <div className="studio-cap" style={{ fontSize:10 }}>Studio</div>
        </div>
      </div>
      <div className="lo-tag">La latitudine è la "cima" dell'asta. Verticalità = ascesa = posizione geografica.</div>
    </div>
  );
}

function A4_AstaInline({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">A4 · Asta · lockup orizzontale completo</div>
      <div className="lo-title">Verticalità · firma</div>
      <div style={{ display:'flex', alignItems:'center', gap: 22 }}>
        <div style={{ width: 1, height: 84, background: A }}></div>
        <div style={{ display:'flex', flexDirection:'column', gap: 6 }}>
          <div style={{ display:'flex', alignItems:'baseline', gap: 16 }}>
            <div className="wm" style={{ fontSize: 52, lineHeight:1 }}>Verti</div>
            <div className="studio-cap" style={{ fontSize:11, alignSelf:'center' }}>Studio</div>
          </div>
          <div className="coord" style={{ fontSize:9, color: light?'#9a9489':'#7a7468' }}>Bolzano · 46.4983° N · 11.3548° E</div>
        </div>
      </div>
      <div className="lo-tag">Lockup completo per email signature, footer, biglietto. Verti+Studio in linea.</div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════
// FAMIGLIA B — Vette stratificate (evoluzione 08) con coordinate
// ════════════════════════════════════════════════════════════════════

function B1_VetteCoord({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">B1 · Vette + coordinate base</div>
      <div className="lo-title">Profondità · base</div>
      <div style={{ display:'flex', alignItems:'center', gap: 24 }}>
        <svg viewBox="0 0 64 64" width="92" height="92">
          <path d="M4 50 L18 26 L26 36 L40 18 L60 50" fill="none" stroke={light?'#0a0a0a':N} strokeWidth="1.3"/>
          <path d="M4 56 L24 36 L34 44 L48 28 L60 56" fill="none" stroke={light?'#3a3a3a':'#7a7468'} strokeWidth="1" opacity=".55"/>
          <path d="M40 18 L42 22" stroke={A} strokeWidth="1.4"/>
        </svg>
        <div style={{ width: 1, height: 64, background: light?'#ddd':'#2c2c2c' }}></div>
        <div style={{ display:'flex', flexDirection:'column', gap: 6 }}>
          <div style={{ display:'flex', alignItems:'baseline', gap: 14 }}>
            <div className="wm" style={{ fontSize: 38, lineHeight:1 }}>Verti</div>
            <div className="studio-cap" style={{ fontSize:10, alignSelf:'center' }}>Studio</div>
          </div>
          <div className="coord" style={{ fontSize:9, color: light?'#9a9489':'#7a7468' }}>46.4983° N · 11.3548° E</div>
        </div>
      </div>
      <div className="lo-tag">Vette + Verti Studio orizzontale + coordinate. Tutto in una riga.</div>
    </div>
  );
}

function B2_VetteCoordStack({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">B2 · Vette + lockup stacked</div>
      <div className="lo-title">Profondità · stacked</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 14 }}>
        <svg viewBox="0 0 80 56" width="120" height="84">
          <path d="M4 46 L22 22 L32 32 L48 14 L76 46" fill="none" stroke={light?'#0a0a0a':N} strokeWidth="1.3"/>
          <path d="M4 52 L28 32 L40 40 L56 24 L76 52" fill="none" stroke={light?'#3a3a3a':'#7a7468'} strokeWidth="1" opacity=".55"/>
          <path d="M48 14 L50 18" stroke={A} strokeWidth="1.4"/>
        </svg>
        <div style={{ display:'flex', alignItems:'baseline', gap: 16 }}>
          <div className="wm" style={{ fontSize: 56, lineHeight:1 }}>Verti</div>
          <div className="studio-cap" style={{ fontSize:12, alignSelf:'center' }}>Studio</div>
        </div>
        <div style={{ width: 36, height: 1, background: A, marginTop: 4 }}></div>
        <div className="coord" style={{ fontSize:9, color: light?'#9a9489':'#7a7468' }}>46.4983° N · 11.3548° E</div>
      </div>
      <div className="lo-tag">Lockup verticale. Per copertina, frontespizio, hero secondaria.</div>
    </div>
  );
}

function B3_VetteCoordSplit({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">B3 · Vette · coordinate sotto vette</div>
      <div className="lo-title">Profondità · marker</div>
      <div style={{ display:'flex', alignItems:'center', gap: 24 }}>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 8 }}>
          <svg viewBox="0 0 64 56" width="84" height="74">
            <path d="M4 46 L18 22 L26 32 L40 14 L60 46" fill="none" stroke={light?'#0a0a0a':N} strokeWidth="1.3"/>
            <path d="M4 52 L24 32 L34 40 L48 24 L60 52" fill="none" stroke={light?'#3a3a3a':'#7a7468'} strokeWidth="1" opacity=".55"/>
            <path d="M40 14 L42 18" stroke={A} strokeWidth="1.4"/>
          </svg>
          <div className="coord" style={{ fontSize:8, color: A }}>46.49° N</div>
        </div>
        <div style={{ width: 1, height: 88, background: light?'#ddd':'#2c2c2c' }}></div>
        <div style={{ display:'flex', flexDirection:'column', gap: 6 }}>
          <div className="wm" style={{ fontSize: 44, lineHeight:1 }}>Verti</div>
          <div className="studio-cap" style={{ fontSize:11 }}>Studio</div>
          <div className="coord" style={{ fontSize:9, marginTop: 6, color: light?'#9a9489':'#7a7468' }}>Bolzano · Alto Adige</div>
        </div>
      </div>
      <div className="lo-tag">Vette con coordinate ambra come targa altimetrica. Più scenografico.</div>
    </div>
  );
}

function B4_VetteMonogram({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">B4 · Vette · uso compatto / favicon</div>
      <div className="lo-title">Profondità · mark</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 28 }}>
        <div style={{ display:'flex', alignItems:'center', gap: 22 }}>
          <div style={{ width:88, height:88, border:`1px solid ${light?'#0a0a0a':'#2c2c2c'}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg viewBox="0 0 64 56" width="56" height="48">
              <path d="M4 46 L18 22 L26 32 L40 14 L60 46" fill="none" stroke={light?'#0a0a0a':N} strokeWidth="1.6"/>
              <path d="M4 52 L24 32 L34 40 L48 24 L60 52" fill="none" stroke={light?'#3a3a3a':'#7a7468'} strokeWidth="1.2" opacity=".55"/>
              <path d="M40 14 L42 18" stroke={A} strokeWidth="1.6"/>
            </svg>
          </div>
          <div style={{ width:88, height:88, background: A, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg viewBox="0 0 64 56" width="56" height="48">
              <path d="M4 46 L18 22 L26 32 L40 14 L60 46" fill="none" stroke="#0a0a0a" strokeWidth="1.8"/>
              <path d="M4 52 L24 32 L34 40 L48 24 L60 52" fill="none" stroke="#0a0a0a" strokeWidth="1.4" opacity=".5"/>
            </svg>
          </div>
          <div style={{ width:88, height:88, background: light?'#0a0a0a':'#141414', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg viewBox="0 0 64 56" width="56" height="48">
              <path d="M4 46 L18 22 L26 32 L40 14 L60 46" fill="none" stroke={N} strokeWidth="1.6"/>
              <path d="M4 52 L24 32 L34 40 L48 24 L60 52" fill="none" stroke="#7a7468" strokeWidth="1.2" opacity=".55"/>
              <path d="M40 14 L42 18" stroke={A} strokeWidth="1.6"/>
            </svg>
          </div>
        </div>
        <div className="studio-cap" style={{ fontSize:9, color: light?'#9a9489':'#7a7468' }}>Favicon · App icon · Avatar</div>
      </div>
      <div className="lo-tag">Solo il simbolo vette: tre trattamenti per favicon, social, biglietto.</div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════
// FAMIGLIA C — Coordinate (riedizione 07) con NOME COMPLETO Verti Studio
// ════════════════════════════════════════════════════════════════════

function C1_CoordInline({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">C1 · Verti Studio + coordinate inline</div>
      <div className="lo-title">Geografico · base</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', gap: 16 }}>
        <div style={{ display:'flex', alignItems:'baseline', gap: 22 }}>
          <div className="wm" style={{ fontSize: 76, lineHeight:1 }}>Verti</div>
          <div className="studio-cap" style={{ fontSize:14, alignSelf:'center' }}>Studio</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <div style={{ width: 28, height: 1, background: A }}></div>
          <div className="coord" style={{ fontSize:10, color: light?'#9a9489':'#7a7468' }}>46.4983° N · 11.3548° E</div>
        </div>
      </div>
      <div className="lo-tag">Verti grande in serif + Studio piccolo in sans, coordinate a firma sotto.</div>
    </div>
  );
}

function C2_CoordStacked({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">C2 · Verti Studio stacked geografico</div>
      <div className="lo-title">Geografico · stacked</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', gap: 6 }}>
        <div className="coord" style={{ fontSize:9, color: A, marginBottom: 8 }}>46.4983° N · 11.3548° E</div>
        <div className="wm" style={{ fontSize: 76, lineHeight:.92 }}>Verti</div>
        <div className="wm" style={{ fontSize: 76, lineHeight:.92 }}>Studio</div>
        <div style={{ width: 64, height: 1, background: A, marginTop: 14 }}></div>
        <div className="coord" style={{ fontSize:9, marginTop: 8, color: light?'#9a9489':'#7a7468' }}>Bolzano · Alto Adige</div>
      </div>
      <div className="lo-tag">Verti / Studio impilati nel grande corpo serif. Verticalità tipografica pura.</div>
    </div>
  );
}

function C3_CoordSerifBoth({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">C3 · Verti Studio serif + corsivo</div>
      <div className="lo-title">Geografico · editoriale</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', gap: 10 }}>
        <div style={{ display:'flex', alignItems:'baseline' }}>
          <div className="wm" style={{ fontSize: 78, lineHeight:1 }}>Verti</div>
          <div className="wm" style={{ fontSize: 78, lineHeight:1, fontStyle:'italic', marginLeft:'.18em', color: A }}>Studio</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap: 14, marginTop: 6 }}>
          <div style={{ width: 24, height: 1, background: A }}></div>
          <div className="coord" style={{ fontSize:10, color: light?'#9a9489':'#7a7468' }}>46.4983° N · 11.3548° E · Bolzano</div>
        </div>
      </div>
      <div className="lo-tag">Studio in italico ambra. Tutto serif, gerarchia per stile, non per famiglia.</div>
    </div>
  );
}

function C4_CoordCentered({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">C4 · Verti Studio centrato monumentale</div>
      <div className="lo-title">Geografico · monumentale</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 14 }}>
        <div className="coord" style={{ fontSize:9, color: light?'#9a9489':'#7a7468' }}>46.4983° N</div>
        <div className="wm" style={{ fontSize: 88, lineHeight:.92, letterSpacing:'-.02em' }}>Verti Studio</div>
        <div className="coord" style={{ fontSize:9, color: light?'#9a9489':'#7a7468' }}>11.3548° E</div>
        <div style={{ width: 40, height: 1, background: A, marginTop: 6 }}></div>
      </div>
      <div className="lo-tag">Verti Studio in una riga, coordinate sopra/sotto come quote di una mappa.</div>
    </div>
  );
}

function C5_CoordSeal({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">C5 · Verti Studio · sigillo geografico</div>
      <div className="lo-title">Geografico · sigillo</div>
      <div style={{ display:'flex', alignItems:'center', gap: 28 }}>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap: 4, fontFamily:'Inter', fontWeight:300, fontSize: 9, letterSpacing:'.18em', textTransform:'uppercase', color: light?'#9a9489':'#7a7468' }}>
          <div>46.4983°</div>
          <div>11.3548°</div>
          <div style={{ color: A }}>262 m</div>
        </div>
        <div style={{ width: 1, height: 80, background: A }}></div>
        <div style={{ display:'flex', flexDirection:'column', gap: 8 }}>
          <div className="wm" style={{ fontSize: 64, lineHeight:.92 }}>Verti</div>
          <div className="studio-cap" style={{ fontSize:12 }}>Studio</div>
        </div>
      </div>
      <div className="lo-tag">Targa geografica completa: lat, lon, quota. Asta come pilastro tra dato e nome.</div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════

function App() {
  return (
    <DesignCanvas projectName="Verti Studio · Logo Refinement">
      <DCSection id="famA" title="Famiglia A — Asta verticale + coordinate">
        <DCArtboard id="A1" label="A1 — coordinate sotto" width={560} height={380}><A1_AstaCoord/></DCArtboard>
        <DCArtboard id="A2" label="A2 — coordinate verticali ai lati" width={620} height={380}><A2_AstaCoordSplit/></DCArtboard>
        <DCArtboard id="A3" label="A3 — coordinate vetta/base" width={560} height={380}><A3_AstaCoordTop/></DCArtboard>
        <DCArtboard id="A4" label="A4 — lockup orizzontale firma" width={620} height={340}><A4_AstaInline/></DCArtboard>
      </DCSection>

      <DCSection id="famB" title="Famiglia B — Vette stratificate + coordinate">
        <DCArtboard id="B1" label="B1 — base orizzontale" width={620} height={340}><B1_VetteCoord/></DCArtboard>
        <DCArtboard id="B2" label="B2 — stacked verticale" width={520} height={440}><B2_VetteCoordStack/></DCArtboard>
        <DCArtboard id="B3" label="B3 — coordinata sotto vette" width={620} height={400}><B3_VetteCoordSplit/></DCArtboard>
        <DCArtboard id="B4" label="B4 — applicazioni mark" width={620} height={400}><B4_VetteMonogram/></DCArtboard>
      </DCSection>

      <DCSection id="famC" title="Famiglia C — Coordinate (07) con nome completo Verti Studio">
        <DCArtboard id="C1" label="C1 — inline base" width={560} height={340}><C1_CoordInline/></DCArtboard>
        <DCArtboard id="C2" label="C2 — stacked monumentale" width={560} height={460}><C2_CoordStacked/></DCArtboard>
        <DCArtboard id="C3" label="C3 — italico ambra" width={620} height={340}><C3_CoordSerifBoth/></DCArtboard>
        <DCArtboard id="C4" label="C4 — centrato monumentale" width={620} height={400}><C4_CoordCentered/></DCArtboard>
        <DCArtboard id="C5" label="C5 — sigillo geografico" width={620} height={380}><C5_CoordSeal/></DCArtboard>
      </DCSection>

      <DCSection id="light" title="Stress test · sfondo chiaro">
        <DCArtboard id="A1l" label="A1 light" width={560} height={380}><A1_AstaCoord light/></DCArtboard>
        <DCArtboard id="B1l" label="B1 light" width={620} height={340}><B1_VetteCoord light/></DCArtboard>
        <DCArtboard id="C2l" label="C2 light" width={560} height={460}><C2_CoordStacked light/></DCArtboard>
        <DCArtboard id="C4l" label="C4 light" width={620} height={400}><C4_CoordCentered light/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
