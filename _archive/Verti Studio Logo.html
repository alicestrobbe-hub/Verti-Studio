<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Verti Studio — Logo Exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --abisso: #0a0a0a; --notte: #141414; --granito: #1e1e1e;
    --pietra: #3a3a3a; --neve: #e8e4dc; --ghiaccio: #c8c4bc;
    --ambra: #c8b89a; --alpino: #3d5a3d;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: var(--sans); color: var(--neve); }
  .lo { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px; padding: 48px; background: var(--abisso); position: relative; }
  .lo.light { background: var(--neve); }
  .lo-mark { display:flex; align-items:center; justify-content:center; }
  .lo-meta { position:absolute; top:24px; left:24px; font-size:9px; font-weight:300; letter-spacing:.22em; text-transform:uppercase; color:var(--pietra); }
  .lo.light .lo-meta { color:#9a9489; }
  .lo-title { position:absolute; top:24px; right:24px; font-family:var(--serif); font-style:italic; font-weight:300; font-size:14px; color:var(--ghiaccio); letter-spacing:.01em; }
  .lo.light .lo-title { color:#3a3a3a; }
  .lo-tag { position:absolute; bottom:24px; left:24px; right:24px; font-size:10px; font-weight:300; letter-spacing:.16em; text-transform:uppercase; color:var(--pietra); text-align:center; }
  .lo.light .lo-tag { color:#7a7468; }
  /* wordmark base */
  .wm { font-family: var(--serif); font-weight: 300; color: var(--neve); letter-spacing:-.012em; line-height:1; display:inline-flex; align-items:baseline; }
  .lo.light .wm { color: var(--abisso); }
  .wm em { font-style: italic; color: var(--ambra); font-weight: 300; }
  .wm-studio { font-family: var(--sans); font-weight: 300; font-size: .26em; letter-spacing:.32em; text-transform:uppercase; color: var(--ghiaccio); margin-left: .8em; align-self: center; }
  .lo.light .wm-studio { color: #555; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const A = "#c8b89a", N = "#e8e4dc", AL = "#3d5a3d", G = "#3a3a3a";

// ─── Logo concepts ───

function L01_Wordmark({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">01 · Wordmark puro</div>
      <div className="lo-title">Sobrio</div>
      <div className="wm" style={{ fontSize: 84 }}>Verti<span className="wm-studio">Studio</span></div>
      <div className="lo-tag">Solo tipografia. Massima eleganza editoriale. La firma di uno studio di architettura.</div>
    </div>
  );
}

function L02_WordmarkAmberLine({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">02 · Wordmark + linea</div>
      <div className="lo-title">Firma</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 14 }}>
        <div className="wm" style={{ fontSize: 84 }}>Verti</div>
        <div style={{ width: 56, height: 1, background: A }}></div>
        <div style={{ fontFamily:'Inter', fontWeight:300, fontSize: 10, letterSpacing:'.4em', textTransform:'uppercase', color: light?'#555':'#c8c4bc' }}>Studio · Bolzano</div>
      </div>
      <div className="lo-tag">Linea ambra come sigillo. Stratificato, premium, riconoscibile.</div>
    </div>
  );
}

function L03_VerticalRule({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">03 · Asta verticale</div>
      <div className="lo-title">Verticalità</div>
      <div style={{ display:'flex', alignItems:'center', gap: 28 }}>
        <div style={{ width: 1, height: 96, background: A }}></div>
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          <div className="wm" style={{ fontSize: 56, lineHeight:.95 }}>Verti</div>
          <div style={{ fontFamily:'Inter', fontWeight:300, fontSize:10, letterSpacing:'.36em', textTransform:'uppercase', color: light?'#555':'#c8c4bc' }}>Studio</div>
        </div>
      </div>
      <div className="lo-tag">L'asta è il vertex. La verticalità è incorporata, non descritta.</div>
    </div>
  );
}

function L04_VMark({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">04 · Monogramma V</div>
      <div className="lo-title">Geometrico</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 24 }}>
        <svg viewBox="0 0 80 80" width="100" height="100">
          <path d="M10 14 L40 70 L70 14" stroke={light?'#0a0a0a':N} strokeWidth="1.4" fill="none" strokeLinecap="square"/>
          <path d="M30 36 L40 18 L50 36" stroke={A} strokeWidth="1" fill="none" opacity=".9"/>
        </svg>
        <div className="wm" style={{ fontSize: 38 }}>Verti<span className="wm-studio" style={{ fontSize:9 }}>Studio</span></div>
      </div>
      <div className="lo-tag">V come vetta: profilo esterno + cima ambra interna. Monogramma componibile.</div>
    </div>
  );
}

function L05_PeakAbstract({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">05 · Vetta astratta</div>
      <div className="lo-title">Simbolo</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 22 }}>
        <svg viewBox="0 0 100 80" width="120" height="96">
          <path d="M10 70 L36 30 L48 46 L62 22 L90 70 Z" fill="none" stroke={light?'#0a0a0a':N} strokeWidth="1.3"/>
          <path d="M62 22 L66 28" stroke={A} strokeWidth="1.3"/>
          <line x1="10" y1="74" x2="90" y2="74" stroke={A} strokeWidth=".7" opacity=".6"/>
        </svg>
        <div className="wm" style={{ fontSize: 36 }}>Verti<span className="wm-studio" style={{ fontSize:9 }}>Studio</span></div>
      </div>
      <div className="lo-tag">Due vette stilizzate, luce ambra in cima. Allusione, non illustrazione.</div>
    </div>
  );
}

function L06_VTriangle({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">06 · V triangolo capovolto</div>
      <div className="lo-title">Iconico</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 22 }}>
        <svg viewBox="0 0 80 80" width="100" height="100">
          <path d="M8 10 L40 70 L72 10" fill="none" stroke={light?'#0a0a0a':N} strokeWidth="1.5"/>
          <circle cx="40" cy="70" r="2.2" fill={A}/>
        </svg>
        <div className="wm" style={{ fontSize: 36 }}>Verti<span className="wm-studio" style={{ fontSize:9 }}>Studio</span></div>
      </div>
      <div className="lo-tag">V isolata + punto ambra al vertice. Minimo ed editoriale.</div>
    </div>
  );
}

function L07_Coordinates({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">07 · Coordinate</div>
      <div className="lo-title">Geografico</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', gap: 16 }}>
        <div className="wm" style={{ fontSize: 78 }}>Verti</div>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <div style={{ width: 28, height: 1, background: A }}></div>
          <div style={{ fontFamily:'Inter', fontWeight:300, fontSize: 10, letterSpacing:'.28em', textTransform:'uppercase', color: light?'#555':'#c8c4bc' }}>
            Studio · 46.5°N · 11.3°E
          </div>
        </div>
      </div>
      <div className="lo-tag">Le coordinate di Bolzano come parte dell'identità. Il luogo è il logo.</div>
    </div>
  );
}

function L08_LayeredPeaks({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">08 · Vette stratificate</div>
      <div className="lo-title">Profondità</div>
      <div style={{ display:'flex', alignItems:'center', gap: 24 }}>
        <svg viewBox="0 0 64 64" width="80" height="80">
          <path d="M4 50 L18 26 L26 36 L40 18 L60 50" fill="none" stroke={light?'#0a0a0a':N} strokeWidth="1.3"/>
          <path d="M4 56 L24 36 L34 44 L48 28 L60 56" fill="none" stroke={light?'#3a3a3a':'#7a7468'} strokeWidth="1" opacity=".6"/>
          <path d="M40 18 L42 22" stroke={A} strokeWidth="1.4"/>
        </svg>
        <div style={{ width: 1, height: 56, background: light?'#ddd':'#2c2c2c' }}></div>
        <div style={{ display:'flex', flexDirection:'column', gap: 4 }}>
          <div className="wm" style={{ fontSize: 38, lineHeight:1 }}>Verti</div>
          <div style={{ fontFamily:'Inter', fontWeight:300, fontSize:10, letterSpacing:'.32em', textTransform:'uppercase', color: light?'#555':'#c8c4bc' }}>Studio</div>
        </div>
      </div>
      <div className="lo-tag">Due livelli di vette + separatore. Mark orizzontale per email signature, footer, biglietto.</div>
    </div>
  );
}

function L09_VItalic({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">09 · V corsiva custom</div>
      <div className="lo-title">Tipografico</div>
      <div className="wm" style={{ fontSize: 110, alignItems:'baseline' }}>
        <span style={{ fontStyle:'italic', color: A, marginRight: '-.05em' }}>V</span>
        <span style={{ marginLeft: '.02em' }}>erti</span>
        <span className="wm-studio" style={{ marginLeft:'.7em' }}>Studio</span>
      </div>
      <div className="lo-tag">La V iniziale italica e ambra. Una sola lettera porta tutta la firma del brand.</div>
    </div>
  );
}

function L10_Stacked({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">10 · Lockup stacked</div>
      <div className="lo-title">Editoriale</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 0 }}>
        <div style={{ fontFamily:'Inter', fontWeight:300, fontSize:10, letterSpacing:'.4em', textTransform:'uppercase', color: light?'#7a7468':'#7a7468', marginBottom: 14 }}>— Founded MMXXVI —</div>
        <div className="wm" style={{ fontSize: 88, lineHeight:.92 }}>Verti</div>
        <div style={{ width: 80, height: 1, background: A, margin: '14px 0' }}></div>
        <div style={{ fontFamily:'Cormorant Garamond', fontStyle:'italic', fontWeight:300, fontSize: 22, color: light?'#3a3a3a':'#c8c4bc', letterSpacing:'.04em' }}>Studio · Bolzano</div>
      </div>
      <div className="lo-tag">Layout editoriale per copertine, frontespizi, pagina About.</div>
    </div>
  );
}

function L11_Vertex({ light }) {
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">11 · Vertex etymology</div>
      <div className="lo-title">Latino</div>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 12 }}>
        <div style={{ fontFamily:'Cormorant Garamond', fontStyle:'italic', fontWeight:300, fontSize: 16, color: A, letterSpacing:'.18em' }}>vertex</div>
        <div className="wm" style={{ fontSize: 80 }}>Verti</div>
        <div style={{ fontFamily:'Inter', fontWeight:300, fontSize: 9, letterSpacing:'.4em', textTransform:'uppercase', color: light?'#555':'#c8c4bc' }}>la cima · the summit</div>
      </div>
      <div className="lo-tag">Etimologia esposta. Il significato è parte del logo, in due lingue.</div>
    </div>
  );
}

function L12_BrandMark({ light }) {
  // compact mark for nav, favicon, social
  return (
    <div className={`lo ${light?'light':''}`}>
      <div className="lo-meta">12 · Brand mark compatto</div>
      <div className="lo-title">App · Favicon</div>
      <div style={{ display:'flex', gap: 24, alignItems:'center' }}>
        <div style={{ width: 88, height: 88, border: `1px solid ${light?'#0a0a0a':'#2c2c2c'}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg viewBox="0 0 32 32" width="44" height="44">
            <path d="M5 6 L16 26 L27 6" stroke={light?'#0a0a0a':N} strokeWidth="1.4" fill="none"/>
            <circle cx="16" cy="26" r="1.4" fill={A}/>
          </svg>
        </div>
        <div style={{ width: 64, height: 64, background: A, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg viewBox="0 0 32 32" width="32" height="32">
            <path d="M5 6 L16 26 L27 6" stroke="#0a0a0a" strokeWidth="1.6" fill="none"/>
          </svg>
        </div>
        <div style={{ width: 64, height: 64, background: light?'#0a0a0a':N, display:'flex', alignItems:'center', justifyContent:'center', color: light?N:'#0a0a0a', fontFamily:'Cormorant Garamond', fontStyle:'italic', fontWeight:300, fontSize:36 }}>V</div>
      </div>
      <div className="lo-tag">Tre versioni dello stesso mark per usi: bordata, piena ambra, V italica.</div>
    </div>
  );
}

// ─── Canvas layout ───

function App() {
  return (
    <DesignCanvas projectName="Verti Studio · Logo">
      <DCSection id="primary" title="Direzioni primarie · sfondo scuro">
        <DCArtboard id="lo01" label="01 — Wordmark" width={520} height={360}><L01_Wordmark/></DCArtboard>
        <DCArtboard id="lo02" label="02 — Wordmark + linea" width={520} height={360}><L02_WordmarkAmberLine/></DCArtboard>
        <DCArtboard id="lo03" label="03 — Asta verticale" width={520} height={360}><L03_VerticalRule/></DCArtboard>
        <DCArtboard id="lo07" label="07 — Coordinate" width={520} height={360}><L07_Coordinates/></DCArtboard>
        <DCArtboard id="lo10" label="10 — Stacked editoriale" width={520} height={420}><L10_Stacked/></DCArtboard>
        <DCArtboard id="lo11" label="11 — Vertex" width={520} height={360}><L11_Vertex/></DCArtboard>
      </DCSection>
      <DCSection id="symbols" title="Con simbolo · monogramma & vetta">
        <DCArtboard id="lo04" label="04 — Monogramma V" width={520} height={400}><L04_VMark/></DCArtboard>
        <DCArtboard id="lo05" label="05 — Vetta astratta" width={520} height={400}><L05_PeakAbstract/></DCArtboard>
        <DCArtboard id="lo06" label="06 — V triangolo" width={520} height={400}><L06_VTriangle/></DCArtboard>
        <DCArtboard id="lo08" label="08 — Vette stratificate" width={520} height={400}><L08_LayeredPeaks/></DCArtboard>
        <DCArtboard id="lo09" label="09 — V corsiva ambra" width={520} height={360}><L09_VItalic/></DCArtboard>
        <DCArtboard id="lo12" label="12 — Brand mark compatto" width={520} height={400}><L12_BrandMark/></DCArtboard>
      </DCSection>
      <DCSection id="light" title="Versione su sfondo chiaro · stress test">
        <DCArtboard id="lo01l" label="01 light" width={520} height={360}><L01_Wordmark light/></DCArtboard>
        <DCArtboard id="lo02l" label="02 light" width={520} height={360}><L02_WordmarkAmberLine light/></DCArtboard>
        <DCArtboard id="lo04l" label="04 light" width={520} height={400}><L04_VMark light/></DCArtboard>
        <DCArtboard id="lo05l" label="05 light" width={520} height={400}><L05_PeakAbstract light/></DCArtboard>
        <DCArtboard id="lo10l" label="10 light" width={520} height={420}><L10_Stacked light/></DCArtboard>
        <DCArtboard id="lo12l" label="12 light" width={520} height={400}><L12_BrandMark light/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
